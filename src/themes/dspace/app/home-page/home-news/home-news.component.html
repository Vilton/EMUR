<!-- home-news.component.html -->
<div class="background-image-container mt-ncs mt-n9 pb-4">

  <div class="carousel-container" #carouselContainer>

    <!-- LOGO CENTRALIZADO (FIXO, NÃO SE MOVE) -->
    <!-- Instructions: Imagem fixa no centro do carrossel, acima de tudo, não animada -->
    <div class="logo-overlay">
      <!-- <img src="assets/dspace/images/emur/heroEmur.svg" -->
      <img src="assets/dspace/images/emur/LOGO_EMUR.png"
        alt="Digidata - Repositório Digital da Memória Urbanística do Recife" class="logo-image">
    </div>

    <!-- Carrossel -->
    <!-- Instructions: Wrapper com slides posicionados absolutely para transição fade. -->
    <div class="carousel-wrapper">

      <div class="carousel-slide" *ngFor="let slide of slides; let i = index; trackBy: trackBySlide"
        [class.active]="i === currentSlide" [class.exiting]="i === previousSlide"
        [ngClass]="i === currentSlide ? 'animation-' + currentAnimation : ''">
        <!-- Otimização: loading="lazy" para carregar imagens sob demanda -->
        <img [src]="slide.image" [alt]="slide.title" loading="lazy" (animationend)="onAnimationEnd()">
        <div class="slide-content">
          <h4>{{ slide.title }}</h4>
        </div>

      </div>
    </div>



    <!-- Botões de navegação -->
    <button class="carousel-btn prev" (click)="prev()" aria-label="Anterior">‹</button>
    <button class="carousel-btn next" (click)="next()" aria-label="Próximo">›</button>

    <!-- Botão de play/pausa -->
    <!-- Instructions: Toggle para pausar/resumir autoplay. Inicia como '❚❚' pois começa reproduzindo. -->
    <button class="carousel-btn play-pause" (click)="togglePlay()" aria-label="Play/Pausa">
      {{ isPlaying ? '❚❚' : '▶' }}
    </button>
  </div>

</div>
